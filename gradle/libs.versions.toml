[versions]
springBoot = "4.1.0"
springDependencyManagement = "1.1.7"
openapiGenerator = "7.23.0"
swagger = "2.2.49"
springdoc = "3.0.2"
jacksonDatabindNullable = "0.2.10"
testcontainers = "1.20.4"
lombok-plugin = "9.5.0"
auth0 = "3.9.0"

[libraries]
swagger-annotations = { module = "io.swagger.core.v3:swagger-annotations", version.ref = "swagger" }
swagger-models = { module = "io.swagger.core.v3:swagger-models", version.ref = "swagger" }
springdoc-scalar = { module = "org.springdoc:springdoc-openapi-starter-webmvc-scalar", version.ref = "springdoc" }
jackson-databind-nullable = { module = "org.openapitools:jackson-databind-nullable", version.ref = "jacksonDatabindNullable" }
testcontainers-bom = { module = "org.testcontainers:testcontainers-bom", version.ref = "testcontainers" }
auth0 = { module = "com.auth0:auth0", version.ref = "auth0" }

[plugins]
spring-boot = { id = "org.springframework.boot", version.ref = "springBoot" }
spring-dependencyManagement = { id = "io.spring.dependency-management", version.ref = "springDependencyManagement" }
openapi-generator = { id = "org.openapi.generator", version.ref = "openapiGenerator" }
lombok = { id = "io.freefair.lombok", version.ref = "lombok-plugin" }
