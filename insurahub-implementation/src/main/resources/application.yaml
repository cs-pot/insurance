spring:
  application:
    name: InsuraHub

  h2:
    console:
      enabled: false
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI}
          audiences:
            - ${AUTH0_AUDIENCE}

---
spring:
  config:
    activate:
      on-profile: dev

  h2:
    console:
      enabled: true
