spring:
  application:
    name: InsuraHub

  datasource:
    url: jdbc:postgresql://localhost:5433/insurahub
    driver-class-name: org.postgresql.Driver
    username: insurahub
    password: insurahub

  jpa:
    hibernate:
      ddl-auto: validate

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml