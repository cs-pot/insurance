databaseChangeLog:
  - changeSet:
      id: 001-create-test-table
      author: cspot
      changes:
        - createTable:
            tableName: test_table
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
