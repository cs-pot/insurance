services:
  postgres:
    image: postgres:18
    container_name: insurahub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - insurahub-network

volumes:
  postgres_data:

networks:
  insurahub-network:
    driver: bridge
