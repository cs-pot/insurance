services:
  postgres:
    image: postgres:16
    container_name: insurahub-postgres
    environment:
      POSTGRES_DB: insurahub
      POSTGRES_USER: insurahub
      POSTGRES_PASSWORD: insurahub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: