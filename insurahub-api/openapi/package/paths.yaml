packages:
  post:
    tags:
      - Packages
    summary: Create a package
    description: Creates a new insurance package. Only administrators can create packages. The name must not be
      blank, startDate must be today or later, and endDate must be after or equal to startDate. The inclusive package
      period must contain at least one full payroll cycle; MONTHLY uses a calendar-month cycle.
    operationId: postPackage
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/PackageRequest'
          examples:
            validPackage:
              summary: Valid package creation request
              value:
                name: Premium Health Package
                payroll: MONTHLY
                startDate: 2030-01-01
                endDate: 2030-12-31
    responses:
      '201':
        $ref: '../common/responses.yaml#/Created'
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '415':
        $ref: '../common/responses.yaml#/UnsupportedMediaType'
      '422':
        $ref: '../common/responses.yaml#/UnprocessableEntity'
      '500':
        $ref: '../common/responses.yaml#/InternalServerError'

  get:
    tags:
      - Packages
    summary: Get insurance packages
    description: Retrieves insurance packages using pagination and optional filters.
    operationId: getPackages
    x-spring-paginated: true
    responses:
      '200':
        description: Insurance packages retrieved successfully.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/GetPackagesResponse'
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '500':
        $ref: '../common/responses.yaml#/InternalServerError'

initializePackage:
  post:
    tags:
      - Packages
    summary: Initialize a package
    description: Initializes a package that has not been started.
    operationId: initializePackage
    parameters:
      - name: packageId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Package initialized successfully
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '404':
        $ref: '../common/responses.yaml#/NotFound'
      '415':
        $ref: '../common/responses.yaml#/UnsupportedMediaType'
      '422':
        $ref: '../common/responses.yaml#/UnprocessableEntity'

packagePlans:
  post:
    tags:
      - Packages
    summary: Add a plan to a package
    description: Adds a new insurance plan to an existing package. Plans may be added after package initialization.
    operationId: addPackagePlan
    parameters:
      - name: packageId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/PlanRequest'
          examples:
            validPlan:
              summary: Valid plan creation request
              value:
                name: Standard Health
                type: HEALTH_INSURANCE
                contribution: 250
                election: 500
    responses:
      '201':
        $ref: '../common/responses.yaml#/Created'
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '404':
        $ref: '../common/responses.yaml#/NotFound'
      '415':
        $ref: '../common/responses.yaml#/UnsupportedMediaType'
      '422':
        $ref: '../common/responses.yaml#/UnprocessableEntity'
      '500':
        $ref: '../common/responses.yaml#/InternalServerError'

packagesWithId:
  put:
    tags:
      - Packages
    summary: Update a package
    description: Updates a package. Only available to administrators.
    operationId: putPackage
    parameters:
      - in: path
        name: id
        description: ID of the package to update.
        schema:
          type: string
          format: uuid
        required: true
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/PackageRequest'
    responses:
      '204':
        description: Successful update
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '404':
        $ref: '../common/responses.yaml#/NotFound'
      '409':
        $ref: '../common/responses.yaml#/Conflict'
      '415':
        $ref: '../common/responses.yaml#/UnsupportedMediaType'
      '422':
        $ref: '../common/responses.yaml#/UnprocessableEntity'
