PackageRequest:
  type: object
  description: Request payload for creating a new insurance package.
  required:
    - name
    - payroll
    - startDate
    - endDate
  properties:
    name:
      type: string
      minLength: 1
      pattern: '.*\S.*'
      description: Name of the insurance package. Must not be blank.
      example: Premium Health Package

    payroll:
      $ref: '#/Payroll'

    startDate:
      type: string
      format: date
      description: Date when the package becomes active. Must be today or later.
      example: "2030-01-01"

    endDate:
      type: string
      format: date
      description: >
        Date when the package expires. Must be equal to or later than startDate.
        The inclusive package period must contain at least one complete payroll cycle.
      example: "2030-12-31"

Payroll:
  type: string
  description: Payroll frequency.
  enum:
    - WEEKLY
    - BI_WEEKLY
    - MONTHLY
    - ANNUALLY
  example: MONTHLY

PlanType:
  type: string
  description: Plan type.
  enum:
    - HEALTH_INSURANCE
    - DENTAL_INSURANCE
    - VISION_INSURANCE
  example: HEALTH_INSURANCE

PlanRequest:
  type: object
  description: Request payload for adding a plan to a package.
  required:
    - name
    - type
    - contribution
    - election
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 50
      pattern: '^(?=.*[A-Za-z])[A-Za-z ]+$'
      description: Plan name. English letters and spaces only, up to 50 characters.
      example: Standard Health
    type:
      $ref: '#/PlanType'
    contribution:
      type: integer
      format: int32
      minimum: 10
      maximum: 1000
      description: Contribution amount in whole euros.
      example: 250
    election:
      type: integer
      format: int32
      minimum: 10
      maximum: 1000
      description: Election amount in whole euros.
      example: 500

PackageResponse:
  allOf:
    - $ref: '../common/schemas.yaml#/BaseListItemResponse'
    - type: object
      required:
        - name
        - payroll
        - startDate
        - endDate
      properties:
        name:
          type: string
          description: Package name.
          example: Premium Health Package

        payroll:
          $ref: '#/Payroll'

        startDate:
          type: string
          format: date
          description: Date when the package becomes active.
          example: "2026-07-01"

        endDate:
          type: string
          format: date
          description: Date when the package expires.
          example: "2027-06-30"

GetPackagesResponse:
  type: object
  required:
    - content
    - page
  properties:
    content:
      type: array
      description: Packages contained in the current page.
      items:
        $ref: '#/PackageResponse'

    page:
      $ref: '../common/schemas.yaml#/PageResponse'
