PlanType:
  type: string
  description: Plan type.
  enum:
    - HEALTH_INSURANCE
    - DENTAL_INSURANCE
    - VISION_INSURANCE
  example: HEALTH_INSURANCE

PlanRequest:
  type: object
  description: Request payload for adding a plan to a package.
  required:
    - name
    - type
    - contribution
    - election
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 50
      pattern: '^(?=.*[A-Za-z])[A-Za-z ]+$'
      description: Plan name. English letters and spaces only, up to 50 characters.
      example: Standard Health
    type:
      $ref: '#/PlanType'
    contribution:
      type: number
      minimum: 10
      maximum: 1000
      description: Contribution amount in euros.
      example: 250.00
    election:
      type: number
      minimum: 10
      maximum: 1000
      description: Election amount in euros.
      example: 500.00
