packagePlans:
  get:
    tags:
      - Plans
    summary: Get package plans
    description: Retrieves plans attached to a package.
    operationId: getPackagePlans
    x-spring-paginated: true
    parameters:
      - name: packageId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
          default: 0
      - name: size
        in: query
        required: false
        description: Page size. Values above 100 are capped to 100 by the application.
        schema:
          type: integer
          format: int32
          minimum: 1
          default: 20
      - name: sort
        in: query
        required: false
        description: >
          Optional sorting in Spring Pageable format: property or property,direction.
          Direction can be asc or desc. Allowed properties: createdAt, name, type.
        schema:
          type: string
          default: createdAt,asc
    responses:
      '200':
        description: Package plans retrieved successfully.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/GetPlansResponse'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '404':
        $ref: '../common/responses.yaml#/NotFound'
      '500':
        $ref: '../common/responses.yaml#/InternalServerError'

  post:
    tags:
      - Plans
    summary: Add a plan to a package
    description: Adds a new insurance plan to an existing package. Plans may be added after package initialization.
    operationId: addPackagePlan
    parameters:
      - name: packageId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/PlanRequest'
          examples:
            validPlan:
              summary: Valid plan creation request
              value:
                name: Standard Health
                type: HEALTH_INSURANCE
                contribution: 250
                election: 500
    responses:
      '201':
        $ref: '../common/responses.yaml#/Created'
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '404':
        $ref: '../common/responses.yaml#/NotFound'
      '415':
        $ref: '../common/responses.yaml#/UnsupportedMediaType'
      '422':
        $ref: '../common/responses.yaml#/UnprocessableEntity'
      '500':
        $ref: '../common/responses.yaml#/InternalServerError'
