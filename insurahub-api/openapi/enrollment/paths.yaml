enrollments:
  get:
    tags:
      - Enrollments
    summary: Get active enrollments for the current consumer
    description: Returns a list of active enrollments for the authenticated consumer.
    operationId: getActiveEnrollments
    responses:
      '200':
        description: Successfully retrieved active enrollments
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: './schemas.yaml#/EnrollmentResponse'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
