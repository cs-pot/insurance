users:
  post:
    tags:
      - Users
    summary: Create a user
    description: Creates a user with provided credentials. Only available to administrators.
    operationId: createUser
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/UserCreateRequest'
    responses:
      201:
        description: User created
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UserCreationResponse'
      400:
        description: Bad Request
      401:
        description: Unauthorized
      403:
        description: Forbidden
