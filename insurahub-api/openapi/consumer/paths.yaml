consumers:
  get:
    tags:
      - Consumers
    summary: View consumers
    description: Returns consumers with key information for consumer management. Only available to administrators.
    operationId: getConsumers
    x-spring-paginated: true
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
          default: 0
      - name: size
        in: query
        required: false
        description: Page size. Values above 100 are capped to 100 by the application.
        schema:
          type: integer
          format: int32
          minimum: 1
          default: 20
      - name: search
        in: query
        required: false
        description: >
          Optional search term to filter consumers by name (first or last) or personal ID.
        schema:
          type: string
          minLength: 1
      - name: sort
        in: query
        required: false
        description: >
          Optional sorting in Spring Pageable format: property or property,direction.
          Direction can be asc or desc. Allowed properties: createdAt, firstName, lastName, email.
        schema:
          type: string
          default: createdAt,asc
    responses:
      '200':
        description: Consumers retrieved successfully.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/GetConsumersResponse'
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '500':
        $ref: '../common/responses.yaml#/InternalServerError'

  post:
    tags:
      - Consumers
    summary: Create a consumer
    description: >
      Creates a new consumer account. Only administrators can perform this operation.
      The email address must be unique, the personal ID must contain exactly 11 digits,
      and all required consumer details must be provided.
    operationId: postConsumer
    requestBody:
      required: true
      description: Consumer details required to create a new account.
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/PostConsumerRequest'
          examples:
            validConsumer:
              summary: Valid consumer creation request
              value:
                email: john.doe@example.com
                password: SecurePassword123!
                firstName: John
                lastName: Doe
                personalId: "12345678901"
                dateOfBirth: "1995-06-15"
                address: 25 Main Street
                city: Vilnius
    responses:
      '201':
        $ref: '../common/responses.yaml#/Created'
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '409':
        $ref: '../common/responses.yaml#/Conflict'
      '500':
        $ref: '../common/responses.yaml#/InternalServerError'

consumerById:
  delete:
    tags:
      - Consumers
    summary: Remove a consumer
    description: Removes a consumer record by its ID.
    operationId: deleteConsumer
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Consumer removed successfully (No Content)
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../common/schemas.yaml#/ErrorDto'
  put:
    tags:
      - Consumers
    summary: Update a consumer
    description: Updates an existing consumer's profile information.
    operationId: putConsumer
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/PutConsumerRequest'
          examples:
            validConsumer:
              summary: Valid consumer update request
              value:
                firstName: Jane
                lastName: Doe
                personalId: "10987654321"
                dateOfBirth: "2005-01-12"
                address: 67 Main Street
                city: Kaunas
    responses:
      '204':
        description: Updated consumer
      '400':
        $ref: '../common/responses.yaml#/BadRequest'
      '401':
        $ref: '../common/responses.yaml#/Unauthorized'
      '403':
        $ref: '../common/responses.yaml#/Forbidden'
      '404':
        $ref: '../common/responses.yaml#/NotFound'
      '409':
        $ref: '../common/responses.yaml#/Conflict'
      '500':
        $ref: '../common/responses.yaml#/InternalServerError'
