PostConsumerRequest:
  type: object
  required:
    - email
    - password
    - firstName
    - lastName
    - personalId
    - dateOfBirth
    - address
    - city
  properties:
    email:
      type: string
      format: email
      description: Unique email address of the consumer.
      example: john.doe@example.com

    password:
      type: string
      format: password
      minLength: 8
      description: Password used to authenticate the consumer.
      example: SecurePassword123!

    firstName:
      type: string
      minLength: 1
      description: Consumer's first name.
      example: John

    lastName:
      type: string
      minLength: 1
      description: Consumer's last name.
      example: Doe

    personalId:
      type: string
      pattern: '^[0-9]{11}$'
      description: Consumer's personal identification number containing exactly 11 digits.
      example: "12345678901"

    dateOfBirth:
      type: string
      format: date
      description: Consumer's date of birth.
      example: "1995-06-15"

    address:
      type: string
      minLength: 1
      description: Consumer's residential address.
      example: 25 Main Street

    city:
      type: string
      minLength: 1
      description: City where the consumer resides.
      example: Vilnius

PutConsumerRequest:
  type: object
  required:
    - firstName
    - lastName
    - personalId
    - dateOfBirth
    - address
    - city
  properties:
    firstName:
      type: string
      minLength: 1
      description: Consumer's first name.
      example: John

    lastName:
      type: string
      minLength: 1
      description: Consumer's last name.
      example: Doe

    personalId:
      type: string
      pattern: "^[0-9]{11}$"
      description: Consumer's personal identification number containing exactly 11 digits.
      example: "12345678901"

    dateOfBirth:
      type: string
      format: date
      description: Consumer's date of birth.
      example: "1995-06-15"

    address:
      type: string
      description: Consumer's residential address.
      example: 25 Main Street

    city:
      type: string
      description: City where the consumer resides.
      example: Vilnius

ConsumerResponse:
  type: object
  required:
    - id
    - firstName
    - lastName
    - fullName
    - personalId
    - dateOfBirth
  properties:
    id:
      type: string
      format: uuid
    firstName:
      type: string
    lastName:
      type: string
    fullName:
      type: string
    personalId:
      type: string
    dateOfBirth:
      type: string
      format: date

PagedModelConsumerResponse:
  allOf:
    - $ref: './schemas.yaml#/ConsumerPageMetadata'
    - type: object
      required:
        - content
      properties:
        content:
          type: array
          items:
            $ref: './schemas.yaml#/ConsumerResponse'

ConsumerPageMetadata:
  type: object
  required:
    - size
    - number
    - totalElements
    - totalPages
  properties:
    size:
      type: integer
      format: int32
    number:
      type: integer
      format: int32
    totalElements:
      type: integer
      format: int64
    totalPages:
      type: integer
      format: int32
