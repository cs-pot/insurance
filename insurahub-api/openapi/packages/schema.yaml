PackageCreateRequest:
  type: object
  required:
    - name
    - payroll
    - startDate
    - endDate
  properties:
    name:
      type: string
      minLength: 1
      pattern: '.*\S.*'
      description: Must not be blank.
      example: Premium Health Package
    payroll:
      type: string
      enum:
        - WEEKLY
        - BI_WEEKLY
        - MONTHLY
      example: MONTHLY
    startDate:
      type: string
      format: date
      description: Must be today or later.
      example: 2030-01-01
    endDate:
      type: string
      format: date
      description: Must be after or equal to startDate. The inclusive range must contain at least one full
        payroll cycle.
      example: 2030-12-31

PackageCreationResponse:
  type: object
  required:
    - id
  properties:
    id:
      type: string
      format: uuid
      example: 7f9c8d13-5b1d-4a9d-9a47-0f3d8b6c9e12

ErrorResponse:
  type: object
  required:
    - code
    - message
  properties:
    code:
      type: string
      example: PACKAGE_START_DATE_IN_PAST
    message:
      type: string
      example: Start date must not be before today
