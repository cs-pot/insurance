logout:
  post:
    tags:
      - Authentication
    summary: Log out the current user
    description: Invalidates the current JWT access token by adding its JTI to the blacklist.
    operationId: logout
    responses:
      '204':
        description: Successfully logged out (No Content)
      '400':
        description: Bad Request - Token is missing required claims
      '401':
        description: Unauthorized - Token is missing, invalid, or already expired
