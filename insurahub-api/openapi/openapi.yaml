openapi: 3.0.3

info:
  title: InsuraHub API
  version: 1.0.0
  description: |
    REST API for InsuraHub.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Consumers
    description: Operations related to consumer management
  - name: Packages
    description: Operations related to insurance package management
 HEAD
  - name: Enrollments
    description: Operations related to enrollments

  - name: Plans
    description: Operations related to insurance plans
 feature/SCRUM-76-view-available-plans

paths:
  /auth/logout:
    $ref: './authentication/paths.yaml#/logout'
  /consumers:
    $ref: './consumer/paths.yaml#/consumers'
  /consumers/{id}:
    $ref: './consumer/paths.yaml#/consumerById'
  /packages:
    $ref: './package/paths.yaml#/packages'
  /enrollments:
    $ref: './enrollment/paths.yaml#/enrollments'
  /packages/{id}:
    $ref: './package/paths.yaml#/packagesWithId'
  /packages/{packageId}/initialize:
    $ref: './package/paths.yaml#/initializePackage'
  /plans:
    $ref: './plan/paths.yaml#/plans'
  /plans/{id}:
    $ref: './plan/paths.yaml#/planById'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
