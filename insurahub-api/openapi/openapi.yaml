openapi: 3.0.3

info:
  title: InsuraHub API
  version: 1.0.0
  description: |
    REST API for InsuraHub.

servers:
  - url: localhost:8080/api/v1
    description: Local development server

tags:
  - name: Consumers
    description: Operations related to consumer management

paths:
  /consumers:
    $ref: './consumer/paths.yaml#/consumers'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
